<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wall Generator</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial}

#panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.3);
width:220px;
z-index:10;
}

#panel input{width:100%;margin-bottom:6px}
#panel button{width:100%;padding:6px;margin-top:6px}
</style>

</head>
<body>

<div id="panel">

<h3>Wall Generator</h3>

<input type="file" id="textureUpload">

<label>Width (meters)</label>
<input type="number" id="width" value="5">

<label>Height (meters)</label>
<input type="number" id="height" value="3">

<label>Thickness</label>
<input type="number" id="depth" value="0.2">

<label>Tile Size (meters)</label>
<input type="number" id="tileSize" value="1">

<button id="generateBtn">Generate Wall</button>
<button id="exportBtn">Export GLB</button>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFExporter } from "https://unpkg.com/three@0.160.0/examples/jsm/exporters/GLTFExporter.js";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2f2f2);

let camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(6,4,6);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new OrbitControls(camera,renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.7));

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

scene.add(new THREE.GridHelper(20,20));

let wall = null;
let texture = null;

function generateWall(){

let width = parseFloat(document.getElementById("width").value);
let height = parseFloat(document.getElementById("height").value);
let depth = parseFloat(document.getElementById("depth").value);
let tileSize = parseFloat(document.getElementById("tileSize").value);

if(wall) scene.remove(wall);

let geometry = new THREE.BoxGeometry(width,height,depth);

let material;

if(texture){

texture.wrapS = THREE.RepeatWrapping;
texture.wrapT = THREE.RepeatWrapping;

let repeatX = width / tileSize;
let repeatY = height / tileSize;

texture.repeat.set(repeatX,repeatY);

material = new THREE.MeshStandardMaterial({
map:texture
});

}else{

material = new THREE.MeshStandardMaterial({
color:0xcccccc
});

}

wall = new THREE.Mesh(geometry,material);

wall.position.y = height/2;

scene.add(wall);

}

document.getElementById("generateBtn")
.addEventListener("click",generateWall);

document.getElementById("textureUpload")
.addEventListener("change",function(e){

let file = e.target.files[0];

let reader = new FileReader();

reader.onload=function(ev){

let loader = new THREE.TextureLoader();

texture = loader.load(ev.target.result,function(){

generateWall();

});

};

reader.readAsDataURL(file);

});

function exportGLB(){

let exporter = new GLTFExporter();

exporter.parse(

scene,

function(result){

let blob = new Blob([result],{type:"model/gltf-binary"});

let link = document.createElement("a");

link.href = URL.createObjectURL(blob);

link.download = "wall.glb";

link.click();

},

{binary:true}

);

}

document.getElementById("exportBtn")
.addEventListener("click",exportGLB);

function animate(){

requestAnimationFrame(animate);
renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",function(){

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
