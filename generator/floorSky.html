<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soil Types + Realism Controls</title>

<!-- ✅ Import Map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GUI } from "https://unpkg.com/lil-gui@0.19/dist/lil-gui.esm.min.js";

/* ------------------ SCENE ------------------ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaadfff);

/* ------------------ CAMERA ------------------ */
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(6, 6, 10);

/* ------------------ RENDERER ------------------ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* ------------------ CONTROLS ------------------ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* ------------------ LIGHTING ------------------ */
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
sun.castShadow = true;
scene.add(sun);

/* ------------------ TEXTURE LOADER ------------------ */
const loader = new THREE.TextureLoader();

/* ------------------ SOIL TYPES ------------------ */
const soils = {

  "brown soil": {
    map: loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg"),
    normal: loader.load("https://threejs.org/examples/textures/water/Water_1_M_Normal.jpg")
  },

  "dark soil": {
    map: loader.load("soil.jpg"),
    normal: loader.load("https://threejs.org/examples/textures/water/Water_1_M_Normal.jpg")
  },

  "sand": {
    map: loader.load("https://cdn.renderhub.com/eagle-soft/ground-terrain-gravel-pbr-texture/ground-terrain-gravel-pbr-texture-01.jpg"),
    normal: loader.load("https://threejs.org/examples/textures/water/Water_1_M_Normal.jpg")
  }

};

/* repeat all textures */
Object.values(soils).forEach(s => {
  s.map.wrapS = s.map.wrapT = THREE.RepeatWrapping;
  s.map.repeat.set(8, 8);

  s.normal.wrapS = s.normal.wrapT = THREE.RepeatWrapping;
  s.normal.repeat.set(8, 8);
});

/* ------------------ PARAMETERS ------------------ */
const params = {
  soilType: "brown soil",
  height: 0.12,
  roughness: 1.0,        // 🔥 key for removing water reflection
  normalScale: 1.0,
  sunIntensity: 1
};

/* ------------------ TERRAIN ------------------ */
const groundGeo = new THREE.PlaneGeometry(25, 25, 200, 200);
groundGeo.rotateX(-Math.PI / 2);

const pos = groundGeo.attributes.position;

function updateTerrain() {

  for (let i = 0; i < pos.count; i++) {

    let x = pos.getX(i);
    let z = pos.getZ(i);

    let h =
      Math.sin(x * 0.3) * params.height +
      Math.cos(z * 0.3) * params.height;

    pos.setY(i, h);
  }

  pos.needsUpdate = true;
  groundGeo.computeVertexNormals();
}

/* ------------------ MATERIAL ------------------ */
const soilMaterial = new THREE.MeshStandardMaterial({
  roughness: params.roughness,
  metalness: 0,
});

/* apply initial texture */
function updateMaterial() {

  const s = soils[params.soilType];

  soilMaterial.map = s.map;
  soilMaterial.normalMap = s.normal;

  soilMaterial.roughness = params.roughness;

  soilMaterial.normalScale.set(params.normalScale, params.normalScale);

  soilMaterial.needsUpdate = true;
}

updateTerrain();
updateMaterial();

/* ------------------ MESH ------------------ */
const ground = new THREE.Mesh(groundGeo, soilMaterial);
ground.receiveShadow = true;
scene.add(ground);

/* ------------------ GUI ------------------ */
const gui = new GUI();

gui.add(params, "soilType", Object.keys(soils)).name("Soil Type").onChange(() => {
  updateMaterial();
});

gui.add(params, "roughness", 0.7, 1.5, 0.01).name("Roughness").onChange(() => {
  updateMaterial();
});

gui.add(params, "height", 0, 0.3, 0.01).name("Terrain Height").onChange(updateTerrain);

gui.add(params, "normalScale", 0.1, 3, 0.1).name("Surface Detail").onChange(() => {
  soilMaterial.normalScale.set(params.normalScale, params.normalScale);
});

gui.add(params, "sunIntensity", 0, 2, 0.1).name("Sun Intensity").onChange(() => {
  sun.intensity = params.sunIntensity;
});

/* ------------------ RESIZE ------------------ */
window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});

/* ------------------ ANIMATE ------------------ */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
