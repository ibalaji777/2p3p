<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Room Wall Generator</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial}

#panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.3);
width:230px;
z-index:10;
}

#panel input{width:100%;margin-bottom:6px}
#panel button{width:100%;padding:6px;margin-top:6px}
</style>
</head>

<body>

<div id="panel">

<h3>Room Generator</h3>

<input type="file" id="textureUpload">

<label>Room Width</label>
<input type="number" id="roomWidth" value="6">

<label>Room Depth</label>
<input type="number" id="roomDepth" value="5">

<label>Wall Height</label>
<input type="number" id="wallHeight" value="3">

<label>Wall Thickness</label>
<input type="number" id="thickness" value="0.2">

<label>Brick Tile Size</label>
<input type="number" id="tileSize" value="1">

<button id="generateBtn">Generate Room</button>
<button id="exportBtn">Export GLB</button>

</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js"
}
}
</script>

<script type="module">

import * as THREE from "three"
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
import { GLTFExporter } from "https://unpkg.com/three@0.160.0/examples/jsm/exporters/GLTFExporter.js"

let scene=new THREE.Scene()
scene.background=new THREE.Color(0xf2f2f2)

let camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(8,6,8)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let controls=new OrbitControls(camera,renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,0.7))

let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

scene.add(new THREE.GridHelper(20,20))

let texture=null
let walls=[]

function clearWalls(){
walls.forEach(w=>scene.remove(w))
walls=[]
}

function createWall(width,height,depth,x,y,z,rotation){

let geo=new THREE.BoxGeometry(width,height,depth)

let tileSize=parseFloat(document.getElementById("tileSize").value)

let materials=[]

for(let i=0;i<6;i++){

let tex=texture?texture.clone():null

if(tex){

tex.wrapS=THREE.RepeatWrapping
tex.wrapT=THREE.RepeatWrapping

// left & right sides
if(i==0||i==1)
tex.repeat.set(depth/tileSize,height/tileSize)

// top & bottom
else if(i==2||i==3)
tex.repeat.set(width/tileSize,depth/tileSize)

// front & back
else
tex.repeat.set(width/tileSize,height/tileSize)

materials.push(new THREE.MeshStandardMaterial({map:tex}))

}else{

materials.push(new THREE.MeshStandardMaterial({color:0xcccccc}))

}

}

let wall=new THREE.Mesh(geo,materials)

wall.position.set(x,y,z)

if(rotation) wall.rotation.y=rotation

scene.add(wall)

walls.push(wall)

}

function generateRoom(){

clearWalls()

let roomWidth=parseFloat(document.getElementById("roomWidth").value)
let roomDepth=parseFloat(document.getElementById("roomDepth").value)
let wallHeight=parseFloat(document.getElementById("wallHeight").value)
let thickness=parseFloat(document.getElementById("thickness").value)

let y=wallHeight/2

// front wall
createWall(
roomWidth,
wallHeight,
thickness,
0,
y,
-(roomDepth/2 + thickness/2),
0
)

// back wall
createWall(
roomWidth,
wallHeight,
thickness,
0,
y,
(roomDepth/2 + thickness/2),
0
)

// left wall
createWall(
roomDepth + thickness*2,
wallHeight,
thickness,
-(roomWidth/2 + thickness/2),
y,
0,
Math.PI/2
)

// right wall
createWall(
roomDepth + thickness*2,
wallHeight,
thickness,
(roomWidth/2 + thickness/2),
y,
0,
Math.PI/2
)

}

document.getElementById("generateBtn").addEventListener("click",generateRoom)

document.getElementById("textureUpload").addEventListener("change",e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

let loader=new THREE.TextureLoader()

texture=loader.load(ev.target.result,function(){
generateRoom()
})

}

reader.readAsDataURL(file)

})

function exportGLB(){

let exporter=new GLTFExporter()

exporter.parse(
scene,
function(result){

let blob=new Blob([result],{type:"model/gltf-binary"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="room.glb"
link.click()

},
{binary:true}
)

}

document.getElementById("exportBtn").addEventListener("click",exportGLB)

function animate(){

requestAnimationFrame(animate)
renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
