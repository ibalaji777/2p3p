<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Three.js Terrain + Controls</title>

<!-- ✅ Import Map -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<style>
  body { margin: 0; overflow: hidden; }
</style>
</head>

<body>

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GUI } from "https://unpkg.com/lil-gui@0.19/dist/lil-gui.esm.min.js";

/* ------------------ SCENE ------------------ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaadfff);

/* ------------------ CAMERA ------------------ */
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(6, 6, 10);

/* ------------------ RENDERER ------------------ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

/* ------------------ CONTROLS ------------------ */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* ------------------ LIGHTING ------------------ */
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
sun.castShadow = true;
scene.add(sun);

/* ------------------ TEXTURES ------------------ */
const loader = new THREE.TextureLoader();

const diffuse = loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg");
const normal = loader.load("https://threejs.org/examples/textures/water/Water_1_M_Normal.jpg");
const roughness = loader.load("https://threejs.org/examples/textures/terrain/grasslight-big-nm.jpg");

/* repeat */
[diffuse, normal, roughness].forEach(tex => {
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8, 8);
});

/* ------------------ PARAMETERS (CONTROLLED) ------------------ */
const params = {
  height: 0.15,
  normalScale: 1.2,
  sunIntensity: 1,
  sunX: 10,
  sunY: 20,
  sunZ: 10
};

/* ------------------ TERRAIN ------------------ */
const groundGeo = new THREE.PlaneGeometry(25, 25, 200, 200);
groundGeo.rotateX(-Math.PI / 2);

const pos = groundGeo.attributes.position;

function updateTerrain() {

  for (let i = 0; i < pos.count; i++) {

    let x = pos.getX(i);
    let z = pos.getZ(i);

    let height =
      Math.sin(x * 0.3) * params.height +
      Math.cos(z * 0.3) * params.height;

    pos.setY(i, height);
  }

  pos.needsUpdate = true;
  groundGeo.computeVertexNormals();
}

updateTerrain();

/* ------------------ MATERIAL ------------------ */
const soilMaterial = new THREE.MeshStandardMaterial({
  map: diffuse,
  normalMap: normal,
  roughnessMap: roughness,
  roughness: 0.9,
  normalScale: new THREE.Vector2(params.normalScale, params.normalScale)
});

const ground = new THREE.Mesh(groundGeo, soilMaterial);
ground.receiveShadow = true;
scene.add(ground);

/* ------------------ GUI CONTROLS ------------------ */
const gui = new GUI();

gui.add(params, "height", 0, 0.5, 0.01).name("Terrain Height").onChange(updateTerrain);

gui.add(params, "normalScale", 0.1, 3, 0.1).name("Surface Detail").onChange(() => {
  soilMaterial.normalScale.set(params.normalScale, params.normalScale);
});

gui.add(params, "sunIntensity", 0, 2, 0.1).name("Sun Intensity").onChange(() => {
  sun.intensity = params.sunIntensity;
});

gui.add(params, "sunX", -30, 30).name("Sun X").onChange(() => {
  sun.position.x = params.sunX;
});

gui.add(params, "sunY", 0, 50).name("Sun Y").onChange(() => {
  sun.position.y = params.sunY;
});

gui.add(params, "sunZ", -30, 30).name("Sun Z").onChange(() => {
  sun.position.z = params.sunZ;
});

/* ------------------ RESIZE ------------------ */
window.addEventListener("resize", () => {

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth, window.innerHeight);

});

/* ------------------ ANIMATE ------------------ */
function animate() {

  requestAnimationFrame(animate);

  controls.update();

  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
