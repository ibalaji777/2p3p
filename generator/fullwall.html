<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wall Generator</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial}

#panel{
position:absolute;
top:10px;
left:10px;
background:white;
padding:12px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.3);
width:220px;
}

#panel input{width:100%;margin-bottom:6px}
#panel button{width:100%;padding:6px;margin-top:6px}
</style>
</head>

<body>

<div id="panel">

<h3>Wall Generator</h3>

<input type="file" id="textureUpload">

<label>Width</label>
<input type="number" id="width" value="5">

<label>Height</label>
<input type="number" id="height" value="3">

<label>Thickness</label>
<input type="number" id="thickness" value="0.25">

<label>Tile Size</label>
<input type="number" id="tileSize" value="1">

<button onclick="generateWall()">Generate Wall</button>

</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js"
}
}
</script>

<script type="module">

import * as THREE from "three"
import {OrbitControls} from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"

let scene=new THREE.Scene()
scene.background=new THREE.Color(0xf2f2f2)

let camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000)
camera.position.set(6,4,6)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
document.body.appendChild(renderer.domElement)

new OrbitControls(camera,renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,0.8))

let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,8,5)
scene.add(light)

scene.add(new THREE.GridHelper(20,20))

let wall
let texture=null

window.generateWall=function(){

if(wall) scene.remove(wall)

let width=parseFloat(document.getElementById("width").value)
let height=parseFloat(document.getElementById("height").value)
let thickness=parseFloat(document.getElementById("thickness").value)
let tileSize=parseFloat(document.getElementById("tileSize").value)

let materials=[]

for(let i=0;i<6;i++){

let tex=texture?texture.clone():null

if(tex){

tex.wrapS=THREE.RepeatWrapping
tex.wrapT=THREE.RepeatWrapping

if(i==4 || i==5){ // front/back
tex.repeat.set(width/tileSize,height/tileSize)
}
else if(i==0 || i==1){ // sides
tex.repeat.set(thickness/tileSize,height/tileSize)
}
else{ // top/bottom
tex.repeat.set(width/tileSize,thickness/tileSize)
}

materials.push(new THREE.MeshStandardMaterial({map:tex}))

}else{

materials.push(new THREE.MeshStandardMaterial({color:0xcccccc}))

}

}

let geometry=new THREE.BoxGeometry(width,height,thickness)

wall=new THREE.Mesh(geometry,materials)
wall.position.y=height/2

scene.add(wall)

}

document.getElementById("textureUpload").addEventListener("change",e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

let loader=new THREE.TextureLoader()

texture=loader.load(ev.target.result,function(){

generateWall()

})

}

reader.readAsDataURL(file)

})

function animate(){

requestAnimationFrame(animate)
renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
