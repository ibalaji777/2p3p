<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Miter Joint Auto-Railing</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-container {
            position: absolute; top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 10; width: 250px;
        }
        h3 { margin-top: 0; margin-bottom: 5px; font-size: 1.1em; }
        p { font-size: 0.85em; color: #444; margin-bottom: 15px; line-height: 1.4; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        select, input[type="file"] { width: 100%; padding: 5px; box-sizing: border-box; }
        #status { margin-top: 10px; font-size: 0.85em; color: #1a73e8; font-weight: bold; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-container">
        <h3>Miter Joint Configurator</h3>
        <p>Walls now connect mathematically with perfect mitered cuts at the corners.</p>
        
        <div class="control-group">
            <label for="shapeSelect">1. Select Balcony Shape</label>
            <select id="shapeSelect">
                <option value="u-shape">Standard U-Shape</option>
                <option value="square">Closed Square</option>
                <option value="triangle">Triangle</option>
                <option value="hexagon">Hexagon</option>
            </select>
        </div>

        <div class="control-group">
            <label for="fileInput">2. Upload Railing (.glb/.obj)</label>
            <input type="file" id="fileInput" accept=".glb, .obj">
        </div>

        <div id="status">Waiting for upload...</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0a0a0);
        scene.fog = new THREE.Fog(0xa0a0a0, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1, 0);
        controls.update();

        // --- Lighting ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 10, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(50, 50),
            new THREE.MeshPhongMaterial({ color: 0x999999, depthWrite: false })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Global State Variables ---
        const balconyGroup = new THREE.Group();
        scene.add(balconyGroup);
        
        const railingsContainer = new THREE.Group();
        scene.add(railingsContainer);

        let currentEdges = [];
        let currentUploadedModel = null;
        let currentRailingLength = 0;

        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd });
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc });

        // --- Dynamic Mitered Wall Generation ---
        function setBalconyShape(shapeType) {
            // Clear existing geometry
            while(balconyGroup.children.length > 0) balconyGroup.remove(balconyGroup.children[0]); 
            currentEdges = [];

            let points = [];
            
            // Define shapes Counter-Clockwise to ensure normals push outward
            if (shapeType === 'u-shape') {
                points = [
                    new THREE.Vector2(4, -2.5), new THREE.Vector2(4, 2.5), 
                    new THREE.Vector2(-4, 2.5), new THREE.Vector2(-4, -2.5)
                ];
            } else if (shapeType === 'square') {
                points = [
                    new THREE.Vector2(3, -3), new THREE.Vector2(3, 3), 
                    new THREE.Vector2(-3, 3), new THREE.Vector2(-3, -3), 
                    new THREE.Vector2(3, -3) // closed loop
                ];
            } else if (shapeType === 'triangle') {
                points = [
                    new THREE.Vector2(4, -2.5), new THREE.Vector2(0, 4), 
                    new THREE.Vector2(-4, -2.5), new THREE.Vector2(4, -2.5)
                ];
            } else if (shapeType === 'hexagon') {
                const radius = 4;
                for(let i = 0; i <= 6; i++) {
                    const angle = (i / 6) * Math.PI * 2; 
                    points.push(new THREE.Vector2(Math.cos(angle)*radius, Math.sin(angle)*radius));
                }
            }

            const isClosed = (shapeType !== 'u-shape');
            const wallThickness = 0.2;
            const wallHeight = 0.5;

            // Remove duplicated last point for processing if closed
            let workPoints = [...points];
            if (isClosed) workPoints.pop();

            const outerPoints = [];
            const innerPoints = [];

            // 1. Calculate Miter Bisectors
            for (let i = 0; i < workPoints.length; i++) {
                const P = workPoints[i];
                let A, B;
                
                if (isClosed) {
                    A = workPoints[(i - 1 + workPoints.length) % workPoints.length];
                    B = workPoints[(i + 1) % workPoints.length];
                } else {
                    A = (i === 0) ? null : workPoints[i - 1];
                    B = (i === workPoints.length - 1) ? null : workPoints[i + 1];
                }

                let n1, n2;
                // Calculate outward normals
                if (A) {
                    const v1 = new THREE.Vector2().subVectors(P, A).normalize();
                    n1 = new THREE.Vector2(v1.y, -v1.x); 
                }
                if (B) {
                    const v2 = new THREE.Vector2().subVectors(B, P).normalize();
                    n2 = new THREE.Vector2(v2.y, -v2.x); 
                }
                if (!A) n1 = n2.clone();
                if (!B) n2 = n1.clone();

                // Find angle bisector for the miter joint
                const miter = new THREE.Vector2().addVectors(n1, n2).normalize();
                let dot = miter.dot(n1);
                if (Math.abs(dot) < 0.1) dot = Math.sign(dot) * 0.1 || 0.1; // prevent infinite stretch
                
                const miterLength = (wallThickness / 2) / dot;
                
                outerPoints.push(new THREE.Vector2(P.x + miter.x * miterLength, P.y + miter.y * miterLength));
                innerPoints.push(new THREE.Vector2(P.x - miter.x * miterLength, P.y - miter.y * miterLength));
            }

            // 2. Build Floor Slab
            const floorShape = new THREE.Shape();
            floorShape.moveTo(outerPoints[0].x, outerPoints[0].y);
            for(let i=1; i<outerPoints.length; i++) floorShape.lineTo(outerPoints[i].x, outerPoints[i].y);
            floorShape.lineTo(outerPoints[0].x, outerPoints[0].y); // Close loop

            // Extrude Floor downwards
            const floorGeo = new THREE.ExtrudeGeometry(floorShape, { depth: 0.2, bevelEnabled: false });
            floorGeo.rotateX(Math.PI / 2); // Flips Extrusion to Y axis downwards
            const floor = new THREE.Mesh(floorGeo, floorMaterial);
            floor.receiveShadow = true;
            balconyGroup.add(floor);

            // 3. Build Continuous Mitered Wall
            const wallShape = new THREE.Shape();
            if (isClosed) {
                // Main boundary
                wallShape.moveTo(outerPoints[0].x, outerPoints[0].y);
                for(let i=1; i<outerPoints.length; i++) wallShape.lineTo(outerPoints[i].x, outerPoints[i].y);
                wallShape.lineTo(outerPoints[0].x, outerPoints[0].y);
                
                // Cutout hole for the center
                const hole = new THREE.Path();
                hole.moveTo(innerPoints[innerPoints.length-1].x, innerPoints[innerPoints.length-1].y);
                for(let i=innerPoints.length-2; i>=0; i--) hole.lineTo(innerPoints[i].x, innerPoints[i].y);
                wallShape.holes.push(hole);
            } else {
                // Continuous ribbon for open shapes
                wallShape.moveTo(outerPoints[0].x, outerPoints[0].y);
                for(let i=1; i<outerPoints.length; i++) wallShape.lineTo(outerPoints[i].x, outerPoints[i].y);
                for(let i=innerPoints.length-1; i>=0; i--) wallShape.lineTo(innerPoints[i].x, innerPoints[i].y);
                wallShape.lineTo(outerPoints[0].x, outerPoints[0].y);
            }

            // Extrude Wall downwards from Y=0.5
            const wallGeo = new THREE.ExtrudeGeometry(wallShape, { depth: wallHeight, bevelEnabled: false });
            wallGeo.rotateX(Math.PI / 2); 
            const wallMesh = new THREE.Mesh(wallGeo, wallMaterial);
            wallMesh.position.y = wallHeight; // Pull up so it sits exactly on the floor
            wallMesh.castShadow = true; wallMesh.receiveShadow = true;
            balconyGroup.add(wallMesh);

            // 4. Save Center-lines for Railings
            for (let i = 0; i < points.length - 1; i++) {
                currentEdges.push({ 
                    start: new THREE.Vector3(points[i].x, wallHeight, points[i].y), 
                    end: new THREE.Vector3(points[i+1].x, wallHeight, points[i+1].y) 
                });
            }

            if (currentUploadedModel) tileRailings();
        }

        setBalconyShape('u-shape');
        document.getElementById('shapeSelect').addEventListener('change', (e) => setBalconyShape(e.target.value));

        // --- File Upload Logic ---
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');

        fileInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            statusDiv.innerText = `Processing ${file.name}...`;
            const reader = new FileReader();
            const extension = file.name.split('.').pop().toLowerCase();

            reader.onload = function(e) {
                const contents = e.target.result;
                if (extension === 'glb') new GLTFLoader().parse(contents, '', (gltf) => processUploadedModel(gltf.scene));
                else if (extension === 'obj') processUploadedModel(new OBJLoader().parse(contents));
            };

            if (extension === 'glb') reader.readAsArrayBuffer(file);
            else if (extension === 'obj') reader.readAsText(file); 
        });

        function processUploadedModel(model) {
            const initialBox = new THREE.Box3().setFromObject(model);
            const initialSize = initialBox.getSize(new THREE.Vector3());
            const center = initialBox.getCenter(new THREE.Vector3());

            if (initialSize.y === 0 || initialSize.x === 0) return;

            const TARGET_HEIGHT = 1.0; 
            const scaleFactor = TARGET_HEIGHT / initialSize.y;

            model.traverse(function(child) {
                if (child.isMesh) {
                    child.geometry.translate(-center.x, -initialBox.min.y, -center.z);
                    child.geometry.scale(scaleFactor, scaleFactor, scaleFactor);
                    child.castShadow = true; child.receiveShadow = true;
                }
            });

            currentUploadedModel = model;
            currentRailingLength = new THREE.Box3().setFromObject(model).getSize(new THREE.Vector3()).x;
            statusDiv.innerText = "Model uploaded, scaled, and placed.";
            
            tileRailings();
        }

        // --- Railing Placement ---
        function tileRailings() {
            if (!currentUploadedModel) return;

            while(railingsContainer.children.length > 0) railingsContainer.remove(railingsContainer.children[0]); 

            currentEdges.forEach(edge => {
                const edgeVector = new THREE.Vector3().subVectors(edge.end, edge.start);
                const edgeLength = edgeVector.length();
                const direction = edgeVector.clone().normalize();
                
                const count = Math.floor(edgeLength / currentRailingLength);
                let stretchScale = 1;
                let actualCount = count;
                
                if (count === 0) {
                    stretchScale = edgeLength / currentRailingLength;
                    actualCount = 1;
                } else {
                    stretchScale = (edgeLength / count) / currentRailingLength; 
                }

                for (let i = 0; i < actualCount; i++) {
                    const clone = currentUploadedModel.clone();
                    clone.scale.set(stretchScale, 1, 1); 
                    
                    const segmentLength = (currentRailingLength * stretchScale);
                    const offsetDistance = (i * segmentLength) + (segmentLength / 2);
                    
                    const position = edge.start.clone().add(direction.clone().multiplyScalar(offsetDistance));
                    clone.position.copy(position);

                    const target = position.clone().add(direction);
                    clone.lookAt(target);
                    clone.rotateY(-Math.PI / 2); // Faces outward due to CCW vector logic

                    railingsContainer.add(clone);
                }
            });
        }

        // --- Render Loop ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
