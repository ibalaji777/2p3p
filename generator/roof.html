<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wall + Multi Roof Generator (Fixed UV)</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial}
#panel{
position:absolute;top:10px;left:10px;
background:white;padding:12px;border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,.3);
width:260px;z-index:10;font-size:13px;
}
#panel input,#panel select{width:100%;margin-bottom:6px}
#panel button{width:100%;padding:6px;margin-top:6px}
</style>
</head>

<body>

<div id="panel">
<h3>Wall + Roof Generator</h3>

<label>Wall Texture</label>
<input type="file" id="textureUpload">

<label>Roof Texture</label>
<input type="file" id="roofTextureUpload">

<label>Roof Type</label>
<select id="roofType">
<option value="hip">Hip</option>
<option value="gable">Gable</option>
<option value="shed">Shed</option>
<option value="flat">Flat</option>
</select>

<label>Width</label>
<input type="number" id="roomWidth" value="6">
<label>Depth</label>
<input type="number" id="roomDepth" value="5">
<label>Height</label>
<input type="number" id="wallHeight" value="3">
<label>Thickness</label>
<input type="number" id="thickness" value="0.2">

<label>Tile Size</label>
<input type="number" id="tileSize" value="1">
<label>Roof Tile Size</label>
<input type="number" id="roofTileSize" value="1">

<button id="generateBtn">Generate Walls</button>
<button id="randomBtn">Random House</button>
<button id="roofBtn">Add Smart Roof</button>
<button id="exportBtn">Export GLB</button>
</div>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js"
}
}
</script>

<script type="module">

import * as THREE from "three"
import {OrbitControls} from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js"
import {GLTFExporter} from "https://unpkg.com/three@0.160.0/examples/jsm/exporters/GLTFExporter.js"

// ===== SCENE =====
let scene=new THREE.Scene()
scene.background=new THREE.Color(0xf2f2f2)

let camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000)
camera.position.set(10,7,10)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(innerWidth,innerHeight)
renderer.shadowMap.enabled=true
document.body.appendChild(renderer.domElement)

new OrbitControls(camera,renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff,0.6))
let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
light.castShadow=true
scene.add(light)

scene.add(new THREE.GridHelper(30,30))

// ===== STATE =====
let texture=null
let roofTexture=null
let objects=[]
let rooms=[]

function clearScene(){
objects.forEach(o=>scene.remove(o))
objects=[]
rooms=[]
}

// ===== WALL =====
function createWall(width,height,depth,x,y,z,rotation){
let geo=new THREE.BoxGeometry(width,height,depth)

let mat
if(texture){
let tex=texture.clone()
tex.wrapS=tex.wrapT=THREE.RepeatWrapping
tex.repeat.set(width/tileSizeInput.value,height/tileSizeInput.value)
mat=new THREE.MeshStandardMaterial({map:tex})
}else{
mat=new THREE.MeshStandardMaterial({color:0xcccccc})
}

let wall=new THREE.Mesh(geo,mat)
wall.position.set(x,y,z)
if(rotation) wall.rotation.y=rotation

scene.add(wall)
objects.push(wall)
}

// ===== ROOM =====
function createRoom(w,d,h,t,x,z){
rooms.push({w,d,x,z,h,t})

let y=h/2

createWall(w,h,t,x,y,z-(d/2+t/2))
createWall(w,h,t,x,y,z+(d/2+t/2))
createWall(d+t*2,h,t,x-(w/2+t/2),y,z,Math.PI/2)
createWall(d+t*2,h,t,x+(w/2+t/2),y,z,Math.PI/2)
}

// ===== ROOF SYSTEM =====
class RoofUtils{

static mat(tex,w,d){
if(!tex) return new THREE.MeshStandardMaterial({color:0x999999,side:THREE.DoubleSide})

let t=tex.clone()
t.wrapS=t.wrapT=THREE.RepeatWrapping
t.repeat.set(w/roofTileSizeInput.value,d/roofTileSizeInput.value)

return new THREE.MeshStandardMaterial({map:t,side:THREE.DoubleSide})
}

// 🔥 FIXED UV (WORLD PROJECTION)
static quadUVProjected(v,uv,a,b,c,d){

v.push(...a,...b,...c,...a,...c,...d)

function map(p){
return [p[0], p[2]] // XZ projection
}

let A=map(a), B=map(b), C=map(c), D=map(d)

uv.push(
A[0],A[1],
B[0],B[1],
C[0],C[1],

A[0],A[1],
C[0],C[1],
D[0],D[1]
)
}

static mesh(v,uv,mat){
let g=new THREE.BufferGeometry()
g.setAttribute("position",new THREE.Float32BufferAttribute(v,3))
g.setAttribute("uv",new THREE.Float32BufferAttribute(uv,2))
g.computeVertexNormals()
return new THREE.Mesh(g,mat)
}

static triangle(a,b,c,mat){
let g=new THREE.BufferGeometry()
g.setAttribute("position",new THREE.Float32BufferAttribute([...a,...b,...c],3))
g.setAttribute("uv",new THREE.Float32BufferAttribute([0,0,1,0,0.5,1],2))
g.computeVertexNormals()
return new THREE.Mesh(g,mat)
}
}

class Roof{
constructor(room){this.room=room}
add(m){scene.add(m);objects.push(m)}
}

// ===== GABLE (FIXED) =====
class GableRoof extends Roof{
build(){

let {w,d,x,z,h,t}=this.room
let rh=h*0.6, W=w+t, D=d+t

let p1=[x-W/2,h,z-D/2]
let p2=[x+W/2,h,z-D/2]
let p3=[x+W/2,h,z+D/2]
let p4=[x-W/2,h,z+D/2]

let v=[],uv=[]
let mat=RoofUtils.mat(roofTexture,W,D)

if(w>=d){
let r1=[x-W/2,h+rh,z]
let r2=[x+W/2,h+rh,z]

RoofUtils.quadUVProjected(v,uv,p1,p2,r2,r1)
RoofUtils.quadUVProjected(v,uv,p4,p3,r2,r1)

this.add(RoofUtils.triangle(p1,r1,p4,mat))
this.add(RoofUtils.triangle(p2,p3,r2,mat))

}else{
let r1=[x,h+rh,z-D/2]
let r2=[x,h+rh,z+D/2]

RoofUtils.quadUVProjected(v,uv,p1,p4,r2,r1)
RoofUtils.quadUVProjected(v,uv,p2,p3,r2,r1)

this.add(RoofUtils.triangle(p1,p2,r1,mat))
this.add(RoofUtils.triangle(p4,r2,p3,mat))
}

this.add(RoofUtils.mesh(v,uv,mat))
}
}

// HIP
class HipRoof extends Roof{
build(){
let {w,d,x,z,h,t}=this.room
let rh=h*0.6, W=w+t, D=d+t

let p1=[x-W/2,h,z-D/2]
let p2=[x+W/2,h,z-D/2]
let p3=[x+W/2,h,z+D/2]
let p4=[x-W/2,h,z+D/2]
let top=[x,h+rh,z]

let v=[],uv=[]
let mat=RoofUtils.mat(roofTexture,W,D)

v.push(...p1,...p2,...top,...p2,...p3,...top,...p3,...p4,...top,...p4,...p1,...top)
uv.push(0,0,1,0,0.5,1,0,0,1,0,0.5,1,0,0,1,0,0.5,1,0,0,1,0,0.5,1)

this.add(RoofUtils.mesh(v,uv,mat))
}
}

// SHED
class ShedRoof extends Roof{
build(){
let {w,d,x,z,h,t}=this.room
let rh=h*0.6, W=w+t, D=d+t

let p1=[x-W/2,h,z-D/2]
let p2=[x+W/2,h,z-D/2]
let t1=[x-W/2,h+rh,z+D/2]
let t2=[x+W/2,h+rh,z+D/2]

let v=[],uv=[]
let mat=RoofUtils.mat(roofTexture,W,D)

RoofUtils.quadUVProjected(v,uv,p1,p2,t2,t1)

this.add(RoofUtils.mesh(v,uv,mat))
}
}

// FLAT
class FlatRoof extends Roof{
build(){
let {w,d,x,z,h,t}=this.room
let W=w+t, D=d+t

let g=new THREE.PlaneGeometry(W,D)
let m=RoofUtils.mat(roofTexture,W,D)

let mesh=new THREE.Mesh(g,m)
mesh.rotation.x=-Math.PI/2
mesh.position.set(x,h+0.01,z)

this.add(mesh)
}
}

// FACTORY
class RoofFactory{
static create(type,room){
if(type==="gable") return new GableRoof(room)
if(type==="hip") return new HipRoof(room)
if(type==="shed") return new ShedRoof(room)
if(type==="flat") return new FlatRoof(room)
}
}

function createMultiRoof(){
rooms.forEach(r=>{
let roof=RoofFactory.create(document.getElementById("roofType").value,r)
roof?.build()
})
}

// ===== EVENTS =====
generateBtn.onclick=()=>{
clearScene()
createRoom(+roomWidth.value,+roomDepth.value,+wallHeight.value,+thickness.value,0,0)
}

randomBtn.onclick=()=>{
clearScene()
createRoom(6,5,3,0.2,0,0)
createMultiRoof()
}

roofBtn.onclick=createMultiRoof

textureUpload.onchange=e=>{
let r=new FileReader()
r.onload=ev=>texture=new THREE.TextureLoader().load(ev.target.result)
r.readAsDataURL(e.target.files[0])
}

roofTextureUpload.onchange=e=>{
let r=new FileReader()
r.onload=ev=>roofTexture=new THREE.TextureLoader().load(ev.target.result)
r.readAsDataURL(e.target.files[0])
}

exportBtn.onclick=()=>{
new GLTFExporter().parse(scene,res=>{
let a=document.createElement("a")
a.href=URL.createObjectURL(new Blob([res],{type:"model/gltf-binary"}))
a.download="design.glb"
a.click()
},{binary:true})
}

// ===== LOOP =====
function animate(){
requestAnimationFrame(animate)
renderer.render(scene,camera)
}
animate()

</script>

</body>
</html>
